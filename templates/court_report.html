<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Court Reports - Forensic System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ecf0f1; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-container { background-color: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border-top: 4px solid #8e44ad; }
        h2 { color: #2c3e50; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #34495e; font-weight: bold; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        .btn-submit { width: 100%; padding: 12px; background-color: #8e44ad; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-submit:hover { background-color: #732d91; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
        .success { color: #27ae60; background-color: #e8f8f5; padding: 10px; border-radius: 4px; text-align: center; margin-bottom: 20px; border: 1px solid #27ae60; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Generate Court Report</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="success">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('court_report') }}">
            <div class="form-group">
                <label for="case_id">Associated Case ID</label>
                <select id="case_id" name="case_id" required>
                    <option value="">-- Choose Case --</option>
                    {% for case in cases %}
                        <option value="{{ case.caseid }}">{{ case.caseid }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="prepared_by">Prepared By (Medical Officer)</label>
                <select id="prepared_by" name="prepared_by" required>
                    <option value="">-- Select Officer --</option>
                    {% for doc in doctors %}
                        <option value="{{ doc.staffid }}">{{ doc.fullname }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="submission_date">Date of Submission</label>
                <input type="date" id="submission_date" name="submission_date" required>
            </div>
            <div class="form-group">
                <label for="status">Report Status</label>
                <select id="status" name="status" required>
                    <option value="Draft">Draft</option>
                    <option value="Finalized">Finalized (Ready for Court)</option>
                    <option value="Submitted">Submitted to Court</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Log Report</button>
        </form>
        <a href="{{ url_for('dashboard') }}" class="btn-back">← Back to Dashboard</a>
    </div>
</body>
</html>
