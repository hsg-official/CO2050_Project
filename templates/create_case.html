<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Case - Forensic System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            border-top: 4px solid #e67e22; /* Different color for visual distinction */
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: bold;
        }
        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .btn-submit:hover {
            background-color: #d35400;
        }
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-back:hover {
            color: #34495e;
            text-decoration: underline;
        }
        .success {
            color: #27ae60;
            background-color: #e8f8f5;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #27ae60;
        }
        .error {
            color: #e74c3c;
            background-color: #fdf0ed;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #e74c3c;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Open Medico-Legal Case</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="{% if 'Error' in message %}error{% else %}success{% endif %}">
                  {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('create_case') }}">
            <div class="form-group">
                <label for="patient_id">Select Patient</label>
                <select id="patient_id" name="patient_id" required>
                    <option value="">-- Choose a Patient --</option>
                    {% for patient in patients %}
                        <option value="{{ patient.patientid }}">{{ patient.fullname }} (ID: {{ patient.patientid }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="assigneddoctor">Assign Doctor</label>
                <select id="assigneddoctor" name="assigneddoctor" required>
                    <option value="">-- Choose a Doctor --</option>
                    {% for doctor in doctors %}
                        <option value="{{ doctor.staffid }}">{{ doctor.fullname }} ({{ doctor.role }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="casetypeid">Case Type</label>
                <select id="casetypeid" name="casetypeid" required>
                    <option value="">-- Choose a Case Type --</option>
                    {% for case_type in case_types %}
                        <option value="{{ case_type.casetypeid }}">{{ case_type.casetypename }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="incident_date">Incident Date</label>
                <input type="date" id="incident_date" name="incident_date" required>
            </div>

            <div class="form-group">
                <label for="officerid">Investigating Officer</label>
                <select id="officerid" name="officerid" required>
                    <option value="">-- Choose an Officer --</option>
                    {% for officer in officers %}
                        <option value="{{ officer.officerid }}">{{ officer.fullname }} (Badge: {{ officer.badgenumber }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="locationid">Police Station</label>
                <select id="locationid" name="locationid" required>
                    <option value="">-- Choose a Police Station --</option>
                    {% for station in policestations %}
                        <option value="{{ station.stationid }}">{{ station.stationname }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="statusid">Status</label>
                <select id="statusid" name="statusid" required>
                    <option value="">-- Choose a Status --</option>
                    {% for case_status in case_statuses %}
                        <option value="{{ case_status.statusid }}">{{ case_status.statusname }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn-submit">Create Case</button>
        </form>
        
        <a href="{{ url_for('dashboard') }}" class="btn-back">← Back to Dashboard</a>
    </div>

</body>
</html>
