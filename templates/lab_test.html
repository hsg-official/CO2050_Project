<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratory Tests - Forensic System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ecf0f1; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-container { background-color: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border-top: 4px solid #1abc9c; }
        h2 { color: #2c3e50; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #34495e; font-weight: bold; }
        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; height: 100px; }
        .btn-submit { width: 100%; padding: 12px; background-color: #1abc9c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-submit:hover { background-color: #16a085; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
        .success { color: #27ae60; background-color: #e8f8f5; padding: 10px; border-radius: 4px; text-align: center; margin-bottom: 20px; border: 1px solid #27ae60; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Record Laboratory Test</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="success">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('lab_test') }}">
            <div class="form-group">
                <label for="evidence_id">Select Evidence</label>
                <select id="evidence_id" name="evidence_id" required>
                    <option value="">-- Choose Evidence Item --</option>
                    {% for item in evidence_items %}
                        <option value="{{ item.EvidenceID }}">ID: {{ item.EvidenceID }} - {{ item.EvidenceType }} (Case: {{ item.CaseID }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="lab_staff_id">Conducted By</label>
                <select id="lab_staff_id" name="lab_staff_id" required>
                    <option value="">-- Select Lab Staff --</option>
                    {% for staff in lab_staff %}
                        <option value="{{ staff.StaffID }}">{{ staff.FullName }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="test_type">Test Type (e.g., Toxicology, DNA)</label>
                <input type="text" id="test_type" name="test_type" required>
            </div>
            <div class="form-group">
                <label for="test_date">Test Date</label>
                <input type="date" id="test_date" name="test_date" required>
            </div>
            <div class="form-group">
                <label for="result">Test Result Details</label>
                <textarea id="result" name="result" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Submit Results</button>
        </form>
        <a href="{{ url_for('dashboard') }}" class="btn-back">← Back to Dashboard</a>
    </div>
</body>
</html>
