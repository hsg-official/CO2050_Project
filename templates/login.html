<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - Forensic System</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b1320, #1a2a3a, #112230);
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            color: #ffffff;
        }

        /* Animated Background Shapes */
        .shape { position: absolute; filter: blur(80px); z-index: 1; animation: float 10s infinite alternate ease-in-out; }
        .shape1 { width: 300px; height: 300px; background: #00f2fe; top: -50px; left: -100px; border-radius: 50%; }
        .shape2 { width: 400px; height: 400px; background: #34e89e; bottom: -150px; right: -50px; border-radius: 50%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translateY(0px) translateX(0px); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        /* Glassmorphism Panel */
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            z-index: 10;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { text-align: center; margin-top: 0; margin-bottom: 30px; font-weight: 600; letter-spacing: 1px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: rgba(255,255,255,0.8); }
        
        /* Glass Inputs */
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            box-sizing: border-box; font-size: 14px;
            transition: border 0.3s ease;
        }
        input:focus { outline: none; border-color: #00f2fe; background: rgba(0, 0, 0, 0.4); }

        /* Neon Glow Button */
        button {
            width: 100%; padding: 12px; margin-top: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease;
        }
        button:hover {
            background: rgba(0, 242, 254, 0.15);
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
            transform: translateY(-2px);
        }

        .error {
            color: #ff7675; background-color: rgba(214, 48, 49, 0.2);
            padding: 10px; border-radius: 8px; text-align: center;
            margin-bottom: 20px; font-size: 14px; border: 1px solid rgba(255, 118, 117, 0.3);
        }
    </style>
</head>
<body>
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>

    <div class="login-container">
        <h2>System Authentication</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Secure Login</button>
        </form>
    </div>
</body>
</html>
