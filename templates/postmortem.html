<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postmortem Entry - Forensic System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            border-top: 4px solid #c0392b; /* Red theme for medical/autopsy */
        }
        h2 { color: #2c3e50; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #34495e; font-weight: bold; }
        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea { resize: vertical; height: 120px; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #c0392b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-submit:hover { background-color: #a93226; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
        .success { color: #27ae60; background-color: #e8f8f5; padding: 10px; border-radius: 4px; text-align: center; margin-bottom: 20px; border: 1px solid #27ae60; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Record Postmortem Findings</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="success">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('postmortem') }}">
            <div class="form-group">
                <label for="case_id">Select Case</label>
                <select id="case_id" name="case_id" required>
                    <option value="">-- Choose an Open Case --</option>
                    {% for case in cases %}
                        <option value="{{ case.CaseID }}">{{ case.CaseID }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="doctor_id">Examining Doctor / JMO</label>
                <select id="doctor_id" name="doctor_id" required>
                    <option value="">-- Confirm Doctor --</option>
                    {% for doc in doctors %}
                        <option value="{{ doc.StaffID }}">{{ doc.FullName }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="examination_date">Examination Date</label>
                <input type="date" id="examination_date" name="examination_date" required>
            </div>

            <div class="form-group">
                <label for="cause_of_death">Cause of Death (Summary)</label>
                <input type="text" id="cause_of_death" name="cause_of_death" placeholder="e.g., Asphyxiation, Blunt Force Trauma" required>
            </div>

            <div class="form-group">
                <label for="findings">Detailed Medical Findings</label>
                <textarea id="findings" name="findings" placeholder="Enter full autopsy observations here..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Submit Report</button>
        </form>
        
        <a href="{{ url_for('dashboard') }}" class="btn-back">← Back to Dashboard</a>
    </div>

</body>
</html>
