<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics & Reports - Forensic System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ecf0f1; padding: 30px; margin: 0; }
        .container { background-color: transparent; max-width: 1200px; margin: auto; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #2c3e50; margin: 0; }
        .btn-print { padding: 10px 20px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Summary Cards */
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background-color: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #3498db; }
        .stat-card h3 { margin: 0; font-size: 2.5rem; color: #2c3e50; }
        .stat-card p { margin: 5px 0 0; color: #7f8c8d; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .stat-card.warning { border-top-color: #e67e22; }
        .stat-card.danger { border-top-color: #e74c3c; }

        /* Chart Grid */
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-container { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .chart-container h4 { margin-top: 0; color: #34495e; text-align: center; }
        
        .btn-back { display: inline-block; margin-top: 30px; color: #7f8c8d; text-decoration: none; }
        .btn-back:hover { color: #34495e; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h2>Department Statistical Reports</h2>
            <button class="btn-print" onclick="window.print()">🖨️ Print Report</button>
        </div>

        <div class="summary-grid">
            <div class="stat-card">
                <h3>{{ pending_cases + pending_reports }}</h3>
                <p>Total Active Actions</p>
            </div>
            <div class="stat-card warning">
                <h3>{{ pending_cases }}</h3>
                <p>Cases Awaiting Closure</p>
            </div>
            <div class="stat-card danger">
                <h3>{{ pending_reports }}</h3>
                <p>Draft Court Reports Pending</p>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-container">
                <h4>Monthly Case Volume</h4>
                <canvas id="monthlyChart"></canvas>
            </div>
            
            <div class="chart-container">
                <h4>Incident Type Breakdown</h4>
                <canvas id="typeChart"></canvas>
            </div>
        </div>
        
        <a href="{{ url_for('dashboard') }}" class="btn-back">← Back to Dashboard</a>
    </div>

    <script>
        // 1. Process Monthly Data
        const rawMonthlyData = {{ monthly_data | tojson }};
        const monthLabels = rawMonthlyData.map(item => item.MonthLabel).reverse();
        const monthCounts = rawMonthlyData.map(item => item.CaseCount).reverse();

        new Chart(document.getElementById('monthlyChart'), {
            type: 'bar',
            data: {
                labels: monthLabels,
                datasets: [{
                    label: 'New Cases',
                    data: monthCounts,
                    backgroundColor: '#3498db',
                    borderRadius: 4
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });

        // 2. Process Incident Type Data
        const rawTypeData = {{ case_type_data | tojson }};
        const typeLabels = rawTypeData.map(item => item.CaseType);
        const typeCounts = rawTypeData.map(item => item.count);

        new Chart(document.getElementById('typeChart'), {
            type: 'doughnut',
            data: {
                labels: typeLabels,
                datasets: [{
                    data: typeCounts,
                    backgroundColor: ['#e74c3c', '#f1c40f', '#2ecc71', '#9b59b6', '#34495e']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
